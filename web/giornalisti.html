<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAIM · Giornalisti</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:#f5f7fa; --bg2:#ffffff; --bg3:#eef1f6; --border:#dde3ed; --border2:#c8d0e0;
            --text:#1a2236; --text2:#5a6a84; --text3:#9aabc0;
            --teal:#0ea5c9; --magenta:#d4367a; --grad:linear-gradient(135deg,#0ea5c9,#d4367a);
            --green:#059669; --red:#e03a5a; --amber:#d97706; --purple:#7c3aed;
            --mono:'IBM Plex Mono',monospace; --sans:'IBM Plex Sans',sans-serif;
        }
        *{margin:0;padding:0;box-sizing:border-box;}
        body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:13px;min-height:100vh;}

        nav{background:var(--bg2);border-bottom:2px solid var(--border);height:56px;display:flex;align-items:center;padding:0 24px;gap:16px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.04)}
        .logo-img{height:38px;width:auto;display:block;flex-shrink:0}
        .nav-links{display:flex;gap:2px;margin-left:auto}
        .nav-link{color:var(--text2);text-decoration:none;font-size:11px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;padding:6px 14px;border-bottom:2px solid transparent;transition:color .2s,border-color .2s}
        .nav-link:hover{color:var(--text)}
        .nav-link.active{color:var(--magenta);border-bottom-color:var(--magenta)}

        .page-header{background:var(--bg2);border-bottom:1px solid var(--border);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;}
        .page-header h1{font-size:18px;font-weight:700;}
        .page-header p{font-size:12px;color:var(--text2);margin-top:3px;}
        .grad-text{background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}

        .period-wrap{display:flex;gap:4px;align-items:center;}
        .period-btn{font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:0.5px;padding:5px 12px;border-radius:3px;border:1px solid var(--border2);background:var(--bg3);color:var(--text2);cursor:pointer;transition:all 0.15s;}
        .period-btn:hover{border-color:var(--teal);color:var(--teal);}
        .period-btn.active{background:rgba(14,165,201,0.1);border-color:var(--teal);color:var(--teal);}

        .main-layout{display:grid;grid-template-columns:300px 1fr;min-height:calc(100vh - 56px - 55px);}
        @media(max-width:900px){.main-layout{grid-template-columns:1fr;}}

        .sidebar{background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;}
        .sidebar-header{padding:12px 16px;border-bottom:1px solid var(--border);background:var(--bg3);display:flex;justify-content:space-between;align-items:center;}
        .sidebar-title{font-family:var(--mono);font-size:9px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);}
        .sidebar-count{font-family:var(--mono);font-size:11px;color:var(--teal);font-weight:600;}

        .journalist-item{display:flex;align-items:center;padding:11px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background 0.1s;gap:10px;}
        .journalist-item:hover{background:var(--bg3);}
        .journalist-item.active{background:#e8f7fc;border-left:3px solid var(--teal);padding-left:13px;}
        .journalist-rank{font-family:var(--mono);font-size:10px;color:var(--text3);width:20px;flex-shrink:0;text-align:right;}
        .journalist-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0;}
        .journalist-info{flex:1;min-width:0;}
        .journalist-name{font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
        .journalist-item.active .journalist-name{color:var(--teal);}
        .journalist-count{font-family:var(--mono);font-size:10px;color:var(--text3);}
        .journalist-bar-wrap{height:3px;background:var(--bg3);border-radius:2px;margin-top:4px;}
        .journalist-bar{height:3px;background:var(--grad);border-radius:2px;transition:width 0.3s;}

        .search-wrap{padding:10px 14px;border-bottom:1px solid var(--border);}
        .search-input{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:4px;padding:7px 10px;font-size:12px;color:var(--text);font-family:var(--sans);transition:border-color 0.15s;}
        .search-input:focus{outline:none;border-color:var(--teal);}
        .search-input::placeholder{color:var(--text3);}

        .detail-panel{display:flex;flex-direction:column;background:var(--bg);}
        .empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text3);gap:12px;padding:48px 20px;text-align:center;}
        .empty-state .icon{font-size:48px;opacity:0.2;}
        .empty-state p{font-family:var(--mono);font-size:10px;letter-spacing:0.8px;line-height:1.8;}

        .detail-header{background:var(--bg2);border-bottom:1px solid var(--border);padding:20px 24px;}
        .detail-header-top{display:flex;align-items:center;gap:16px;margin-bottom:16px;}
        .detail-avatar-lg{width:52px;height:52px;border-radius:50%;background:var(--grad);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;color:#fff;flex-shrink:0;}
        .detail-name{font-size:20px;font-weight:700;color:var(--text);}
        .detail-sub{font-family:var(--mono);font-size:10px;color:var(--text3);margin-top:3px;}

        .stats-row{display:flex;gap:16px;flex-wrap:wrap;}
        .stat-pill{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:8px 16px;display:flex;flex-direction:column;gap:2px;}
        .stat-pill-val{font-family:var(--mono);font-size:16px;font-weight:700;color:var(--teal);}
        .stat-pill-label{font-family:var(--mono);font-size:9px;letter-spacing:0.8px;text-transform:uppercase;color:var(--text3);}

        .testate-section{padding:12px 24px;background:var(--bg2);border-bottom:1px solid var(--border);}
        .testate-title{font-family:var(--mono);font-size:9px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;color:var(--text3);margin-bottom:8px;}
        .testate-list{display:flex;flex-wrap:wrap;gap:6px;}
        .testata-tag{background:rgba(14,165,201,0.08);color:var(--teal);border:1px solid rgba(14,165,201,0.2);border-radius:20px;padding:3px 12px;font-size:11px;font-family:var(--mono);}

        .articles-section{padding:16px 24px;flex:1;}
        .section-title{font-family:var(--mono);font-size:9px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;color:var(--text3);margin-bottom:12px;}
        .article-card{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:14px 16px;margin-bottom:8px;cursor:pointer;transition:border-color 0.15s;animation:fadeIn 0.15s ease;}
        .article-card:hover{border-color:var(--teal);}
        .article-meta{display:flex;gap:8px;align-items:center;margin-bottom:6px;flex-wrap:wrap;}
        .article-testata{font-family:var(--mono);font-size:10px;font-weight:600;color:var(--teal);}
        .article-date{font-family:var(--mono);font-size:10px;color:var(--text3);}
        .article-tone{font-family:var(--mono);font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600;}
        .tone-pos{background:rgba(5,150,105,0.1);color:var(--green);}
        .tone-neg{background:rgba(224,58,90,0.1);color:var(--red);}
        .tone-neu{background:rgba(90,106,132,0.1);color:var(--text2);}
        .article-title{font-size:13px;font-weight:600;color:var(--text);line-height:1.4;}
        .article-topic{font-size:11px;color:var(--text3);margin-top:4px;}

        .loading{padding:32px;text-align:center;font-family:var(--mono);font-size:10px;color:var(--text3);letter-spacing:0.8px;}
        .toast{position:fixed;bottom:24px;right:24px;background:#1a2236;color:#fff;padding:10px 18px;border-radius:6px;font-family:var(--mono);font-size:11px;z-index:2000;opacity:0;transition:opacity 0.2s;pointer-events:none;}
        .toast.show{opacity:1;}

        ::-webkit-scrollbar{width:4px;} ::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
        @keyframes fadeIn{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:none}}
        .fade-in{animation:fadeIn 0.15s ease;}
    </style>
</head>
<body>

<div id="topnav"></div>
<script src="/static/nav.js"></script>

<div class="page-header">
    <div>
        <h1>✍️ <span class="grad-text">Giornalisti</span></h1>
        <p>Esplora i giornalisti che parlano dei tuoi clienti e analizza i loro articoli</p>
    </div>
    <div class="period-wrap">
        <button class="period-btn" data-p="today"    onclick="setPeriod('today')">Oggi</button>
        <button class="period-btn" data-p="7days"    onclick="setPeriod('7days')">7g</button>
        <button class="period-btn active" data-p="30days" onclick="setPeriod('30days')">30g</button>
        <button class="period-btn" data-p="6months"  onclick="setPeriod('6months')">6m</button>
        <button class="period-btn" data-p="year"     onclick="setPeriod('year')">1a</button>
    </div>
</div>

<div class="main-layout">

    <div class="sidebar">
        <div class="sidebar-header">
            <span class="sidebar-title">Classifica</span>
            <span class="sidebar-count" id="journalist-count">0</span>
        </div>
        <div class="search-wrap">
            <input type="text" class="search-input" id="search-input" placeholder="🔍  Cerca giornalista..." oninput="filterJournalists()">
        </div>
        <div style="overflow-y:auto;flex:1;" id="journalist-list">
            <div class="loading">CARICAMENTO...</div>
        </div>
    </div>

    <div class="detail-panel" id="detail-panel">
        <div class="empty-state">
            <div class="icon">✍️</div>
            <p>SELEZIONA UN GIORNALISTA<br>PER VEDERE I SUOI ARTICOLI</p>
        </div>
    </div>

</div>

<div class="toast" id="toast"></div>

<script>
let allJournalists = [];
let filteredJournalists = [];
let currentPeriod = '30days';
let selectedJournalist = null;

// Mappa index → nome per gestire click senza problemi di escaping
let _journalistMap = {};

const COLORS = ['#0ea5c9','#d4367a','#7c3aed','#059669','#d97706','#e03a5a','#0891b2','#7e22ce'];

function avatarColor(name) {
    let h = 0;
    for (let c of name) h = (h * 31 + c.charCodeAt(0)) & 0xffffffff;
    return COLORS[Math.abs(h) % COLORS.length];
}

function initials(name) {
    const parts = name.trim().split(/\s+/);
    if (parts.length >= 2) return (parts[0][0] + parts[parts.length-1][0]).toUpperCase();
    return name.slice(0,2).toUpperCase();
}

function escapeHtml(s) {
    if (!s) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function periodLabel(p) {
    return { today:'Oggi', '7days':'Ultimi 7 giorni', '30days':'Ultimi 30 giorni', '6months':'Ultimi 6 mesi', year:'Ultimo anno' }[p] || p;
}

// ── PERIOD ────────────────────────────────────────────────────────
function setPeriod(p) {
    currentPeriod = p;
    document.querySelectorAll('.period-btn').forEach(b => b.classList.toggle('active', b.dataset.p === p));
    selectedJournalist = null;
    loadJournalists();
}

// ── LOAD ──────────────────────────────────────────────────────────
async function loadJournalists() {
    document.getElementById('journalist-list').innerHTML = '<div class="loading">CARICAMENTO...</div>';
    document.getElementById('detail-panel').innerHTML = `
        <div class="empty-state">
            <div class="icon">✍️</div>
            <p>SELEZIONA UN GIORNALISTA<br>PER VEDERE I SUOI ARTICOLI</p>
        </div>`;
    try {
        const res = await fetch(`/api/top-giornalisti?period=${currentPeriod}&limit=50`);
        allJournalists = await res.json();
        filteredJournalists = [...allJournalists];
        renderList();
    } catch(e) {
        document.getElementById('journalist-list').innerHTML = '<div class="loading">ERRORE DI CARICAMENTO</div>';
    }
}

// ── RENDER LIST ───────────────────────────────────────────────────
function renderList() {
    const list = document.getElementById('journalist-list');
    document.getElementById('journalist-count').textContent = filteredJournalists.length;
    if (!filteredJournalists.length) {
        list.innerHTML = '<div class="loading">NESSUN GIORNALISTA TROVATO</div>';
        return;
    }
    const max = filteredJournalists[0]?.articoli || 1;
    _journalistMap = {};

    list.innerHTML = filteredJournalists.map((j, i) => {
        const idx = i;
        _journalistMap[idx] = j.nome;
        const pct    = Math.round((j.articoli / max) * 100);
        const active = selectedJournalist === j.nome ? 'active' : '';
        const color  = avatarColor(j.nome);
        const rank   = allJournalists.indexOf(j) + 1;
        return `
        <div class="journalist-item ${active}" data-idx="${idx}" onclick="selectJournalistByIdx(${idx})">
            <span class="journalist-rank">${rank}</span>
            <div class="journalist-avatar" style="background:${color}">${initials(j.nome)}</div>
            <div class="journalist-info">
                <div class="journalist-name">${escapeHtml(j.nome)}</div>
                <div class="journalist-count">${j.articoli} articol${j.articoli === 1 ? 'o' : 'i'}</div>
                <div class="journalist-bar-wrap"><div class="journalist-bar" style="width:${pct}%"></div></div>
            </div>
        </div>`;
    }).join('');
}

// ── FILTER ────────────────────────────────────────────────────────
function filterJournalists() {
    const q = document.getElementById('search-input').value.toLowerCase().trim();
    filteredJournalists = q ? allJournalists.filter(j => j.nome.toLowerCase().includes(q)) : [...allJournalists];
    renderList();
}

// ── SELECT — usa indice invece di nome inline nell'onclick ────────
function selectJournalistByIdx(idx) {
    const nome = _journalistMap[idx];
    if (!nome) return;
    selectJournalist(nome);
}

async function selectJournalist(nome) {
    selectedJournalist = nome;
    renderList();
    const panel = document.getElementById('detail-panel');
    panel.innerHTML = '<div class="loading">CARICAMENTO ARTICOLI...</div>';

    try {
        const res = await fetch(`/api/giornalista-articoli?nome=${encodeURIComponent(nome)}&period=${currentPeriod}&limit=100`);
        const articles = await res.json();

        const testate = [...new Set(articles.map(a => a.testata).filter(Boolean))];
        const tones   = articles.reduce((acc, a) => {
            const t = (a.tone || 'neutro').toLowerCase();
            acc[t] = (acc[t] || 0) + 1;
            return acc;
        }, {});
        const posCount = Object.entries(tones).filter(([k]) => k.includes('positiv')).reduce((s, [,v]) => s+v, 0);
        const negCount = Object.entries(tones).filter(([k]) => k.includes('negativ')).reduce((s, [,v]) => s+v, 0);
        const color = avatarColor(nome);

        // Mappa articoli per apertura dettaglio
        const artMap = {};
        articles.forEach((a, i) => { artMap[i] = a.id; });
        window._artMap = artMap;

        panel.innerHTML = `
        <div class="detail-header fade-in">
            <div class="detail-header-top">
                <div class="detail-avatar-lg" style="background:${color}">${initials(nome)}</div>
                <div>
                    <div class="detail-name">${escapeHtml(nome)}</div>
                    <div class="detail-sub">PERIODO: ${periodLabel(currentPeriod)}</div>
                </div>
            </div>
            <div class="stats-row">
                <div class="stat-pill"><span class="stat-pill-val">${articles.length}</span><span class="stat-pill-label">Articoli</span></div>
                <div class="stat-pill"><span class="stat-pill-val" style="color:var(--teal)">${testate.length}</span><span class="stat-pill-label">Testate</span></div>
                <div class="stat-pill"><span class="stat-pill-val" style="color:var(--green)">${posCount}</span><span class="stat-pill-label">Positivi</span></div>
                <div class="stat-pill"><span class="stat-pill-val" style="color:var(--red)">${negCount}</span><span class="stat-pill-label">Negativi</span></div>
            </div>
        </div>
        ${testate.length ? `
        <div class="testate-section fade-in">
            <div class="testate-title">Testate</div>
            <div class="testate-list">${testate.map(t => `<span class="testata-tag">${escapeHtml(t)}</span>`).join('')}</div>
        </div>` : ''}
        <div class="articles-section">
            <div class="section-title">${articles.length} Articoli · ${periodLabel(currentPeriod)}</div>
            ${articles.length
                ? articles.map((a, i) => articleCard(a, i)).join('')
                : '<div class="loading">NESSUN ARTICOLO IN QUESTO PERIODO</div>'}
        </div>`;

    } catch(e) {
        panel.innerHTML = '<div class="loading">ERRORE NEL CARICAMENTO</div>';
    }
}

function articleCard(a, idx) {
    const tone = (a.tone || '').toLowerCase();
    let toneClass = 'tone-neu', toneLabel = '● Neutro';
    if (tone.includes('positiv')) { toneClass = 'tone-pos'; toneLabel = '▲ Positivo'; }
    else if (tone.includes('negativ')) { toneClass = 'tone-neg'; toneLabel = '▼ Negativo'; }
    const dateStr = a.data ? new Date(a.data).toLocaleDateString('it-IT', {day:'2-digit',month:'short',year:'numeric'}) : '';
    return `
    <div class="article-card fade-in" onclick="openArticleByIdx(${idx})">
        <div class="article-meta">
            ${a.testata ? `<span class="article-testata">${escapeHtml(a.testata)}</span>` : ''}
            ${dateStr ? `<span class="article-date">${dateStr}</span>` : ''}
            ${tone ? `<span class="article-tone ${toneClass}">${toneLabel}</span>` : ''}
        </div>
        <div class="article-title">${escapeHtml(a.titolo || 'Titolo non disponibile')}</div>
        ${a.dominant_topic ? `<div class="article-topic">${escapeHtml(a.dominant_topic)}</div>` : ''}
    </div>`;
}

function openArticleByIdx(idx) {
    const id = window._artMap?.[idx];
    if (id) window.open(`/press?article=${id}`, '_blank');
}

// ── INIT ──────────────────────────────────────────────────────────
loadJournalists().then(() => {
    const params = new URLSearchParams(window.location.search);
    const nome = params.get('nome');
    if (nome) selectJournalist(decodeURIComponent(nome));
});
</script>
</body>
</html>
