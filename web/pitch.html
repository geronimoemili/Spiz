<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MAIM · AI Pitch</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=IBM+Plex+Sans:wght@300;400;600;700&display=swap" rel="stylesheet"/>
<style>
  :root{
    --bg:#f4f6f9;--surface:#fff;--border:#dde3ed;
    --text:#1a2236;--muted:#5a6a84;--faint:#9aabc0;
    --cyan:#0ea5c9;--pink:#d4367a;
    --grad:linear-gradient(135deg,#0ea5c9,#d4367a);
    --mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--sans);font-size:13px;background:var(--bg);color:var(--text);min-height:100vh}
  a{text-decoration:none;color:inherit}
  nav{background:var(--surface);border-bottom:2px solid var(--border);height:56px;display:flex;align-items:center;padding:0 24px;gap:16px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.04)}
  .logo-img{height:38px;width:auto;display:block;flex-shrink:0}
  .nav-links{display:flex;gap:2px;margin-left:auto}
  .nav-link{color:var(--muted);font-size:11px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;padding:6px 14px;border-bottom:2px solid transparent;transition:color .2s,border-color .2s}
  .nav-link:hover{color:var(--text)}
  .nav-link.active{color:var(--pink);border-bottom-color:var(--pink)}

  /* PLACEHOLDER */
  .placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:calc(100vh - 56px);gap:16px;color:var(--faint);text-align:center;padding:40px}
  .placeholder-icon{font-size:48px;opacity:.2}
  .placeholder-title{font-family:var(--mono);font-size:12px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase}
  .placeholder-sub{font-family:var(--mono);font-size:10px;color:var(--faint)}
</style>
</head>
<body>

<div id="topnav"></div>
<script src="/static/nav.js"></script>

<div class="placeholder">
  <div class="placeholder-icon">🎯</div>
  <div class="placeholder-title">AI Pitch — In costruzione</div>
  <div class="placeholder-sub">Questa pagina sarà rilavorata</div>
</div>

</body>
</html>
