<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAIM · AI Analysis</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:#f5f7fa; --bg2:#ffffff; --bg3:#eef1f6; --border:#dde3ed; --border2:#c8d0e0;
            --text:#1a2236; --text2:#5a6a84; --text3:#9aabc0;
            --teal:#0ea5c9; --magenta:#d4367a; --grad:linear-gradient(135deg,#0ea5c9,#d4367a);
            --green:#059669; --red:#e03a5a; --amber:#d97706;
            --mono:'IBM Plex Mono',monospace; --sans:'IBM Plex Sans',sans-serif;
        }
        *{margin:0;padding:0;box-sizing:border-box;}
        body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:13px;height:100vh;display:flex;flex-direction:column;}

        /* NAV */
        .topnav{background:var(--bg2);border-bottom:2px solid var(--border);padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:60px;flex-shrink:0;z-index:100;gap:12px;position:relative;}
        .logo-wrap{display:flex;align-items:center;gap:12px;flex-shrink:0;}
        .logo-img{height:36px;width:auto;}
        .logo-divider{width:1px;height:28px;background:var(--border2);}
        .logo-sub{font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);}
        .nav-links{display:flex;gap:2px;}
        .nav-link{color:var(--text2);text-decoration:none;font-size:11px;font-weight:600;letter-spacing:0.5px;text-transform:uppercase;padding:6px 12px;border-bottom:2px solid transparent;transition:all 0.15s;white-space:nowrap;}
        .nav-link:hover{color:var(--teal);border-bottom-color:var(--teal);}
        .nav-link.active{color:var(--magenta);border-bottom-color:var(--magenta);}
        .hamburger{display:none;background:none;border:1px solid var(--border2);padding:6px 10px;border-radius:3px;cursor:pointer;font-size:14px;color:var(--text2);}
        .nav-mobile-menu{display:none;flex-direction:column;gap:2px;background:var(--bg2);border:1px solid var(--border);border-radius:4px;padding:8px;position:fixed;top:64px;right:16px;z-index:9999;min-width:160px;box-shadow:0 4px 20px rgba(0,0,0,0.1);}
        .nav-mobile-menu a{padding:8px 12px;color:var(--text2);text-decoration:none;font-size:12px;font-weight:600;border-radius:3px;}
        .nav-mobile-menu a:hover{background:var(--bg3);color:var(--teal);}
        @media(max-width:768px){.hamburger{display:block;}.nav-links{display:none;}.logo-sub{display:none;}}

        /* LAYOUT */
        .chat-layout{display:flex;flex:1;overflow:hidden;}

        /* SIDEBAR CONVERSAZIONI */
        .chat-sidebar{width:260px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;}
        .sidebar-header{padding:12px 14px;border-bottom:1px solid var(--border);background:var(--bg3);display:flex;justify-content:space-between;align-items:center;}
        .sidebar-title{font-family:var(--mono);font-size:9px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);}
        .btn-new-chat{background:var(--grad);color:#fff;border:none;border-radius:4px;padding:5px 12px;font-family:var(--mono);font-size:10px;font-weight:600;cursor:pointer;letter-spacing:0.3px;}
        .btn-new-chat:hover{opacity:0.9;}
        .conv-list{overflow-y:auto;flex:1;}
        .conv-item{padding:10px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background 0.1s;}
        .conv-item:hover{background:var(--bg3);}
        .conv-item.active{background:#e8f7fc;border-left:3px solid var(--teal);padding-left:11px;}
        .conv-title{font-size:12px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
        .conv-item.active .conv-title{color:var(--teal);}
        .conv-date{font-family:var(--mono);font-size:10px;color:var(--text3);margin-top:2px;}
        .conv-empty{padding:20px 14px;color:var(--text3);font-family:var(--mono);font-size:10px;text-align:center;}

        /* CONTEXT SELECTOR */
        .context-bar{padding:10px 14px;border-bottom:1px solid var(--border);}
        .context-label{font-family:var(--mono);font-size:9px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--text3);margin-bottom:5px;}
        .context-select{width:100%;background:var(--bg3);border:1px solid var(--border2);color:var(--text2);font-family:var(--mono);font-size:11px;padding:6px 8px;border-radius:4px;cursor:pointer;}
        .context-select:focus{outline:none;border-color:var(--teal);}

        /* CHAT MAIN */
        .chat-main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg);}

        /* CHAT HEADER */
        .chat-header{background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
        .chat-header-title{font-family:var(--mono);font-size:11px;font-weight:600;letter-spacing:0.8px;text-transform:uppercase;color:var(--text2);}
        .model-badge{font-family:var(--mono);font-size:9px;font-weight:600;padding:3px 10px;border-radius:3px;background:rgba(14,165,201,0.1);color:var(--teal);border:1px solid rgba(14,165,201,0.25);}

        /* MESSAGES */
        .messages-wrap{flex:1;overflow-y:auto;padding:20px;}
        .welcome-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:16px;text-align:center;color:var(--text3);}
        .welcome-icon{font-size:48px;opacity:0.2;}
        .welcome-title{font-size:18px;font-weight:700;color:var(--text);opacity:0.7;}
        .welcome-sub{font-family:var(--mono);font-size:10px;letter-spacing:0.8px;line-height:1.8;max-width:400px;}
        .suggestions{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:8px;}
        .suggestion-btn{background:var(--bg2);border:1px solid var(--border2);border-radius:20px;padding:7px 16px;font-size:12px;color:var(--text2);cursor:pointer;transition:all 0.15s;}
        .suggestion-btn:hover{border-color:var(--teal);color:var(--teal);background:#f0f9fc;}

        /* MESSAGE BUBBLES */
        .message{display:flex;gap:10px;margin-bottom:16px;animation:fadeIn 0.2s ease;}
        .message.user{flex-direction:row-reverse;}
        .msg-avatar{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;}
        .msg-avatar.ai{background:var(--grad);color:#fff;}
        .msg-avatar.user{background:var(--bg3);border:1px solid var(--border2);color:var(--text2);}
        .msg-bubble{max-width:75%;padding:12px 16px;border-radius:12px;font-size:13px;line-height:1.7;}
        .message.ai   .msg-bubble{background:var(--bg2);border:1px solid var(--border);border-top-left-radius:2px;color:var(--text);}
        .message.user .msg-bubble{background:var(--grad);color:#fff;border-top-right-radius:2px;}
        .msg-bubble pre{background:rgba(0,0,0,0.05);border-radius:6px;padding:10px 12px;margin:8px 0;overflow-x:auto;font-family:var(--mono);font-size:11px;}
        .message.user .msg-bubble pre{background:rgba(0,0,0,0.15);}
        .msg-bubble table{width:100%;border-collapse:collapse;margin:8px 0;font-size:12px;}
        .msg-bubble th{background:rgba(14,165,201,0.1);padding:6px 10px;text-align:left;font-family:var(--mono);font-size:10px;letter-spacing:0.5px;text-transform:uppercase;border-bottom:2px solid var(--border);}
        .msg-bubble td{padding:6px 10px;border-bottom:1px solid var(--border);}
        .msg-time{font-family:var(--mono);font-size:9px;color:var(--text3);margin-top:4px;}
        .message.user .msg-time{text-align:right;}

        /* TYPING INDICATOR */
        .typing{display:flex;align-items:center;gap:4px;padding:12px 16px;}
        .typing span{width:6px;height:6px;background:var(--text3);border-radius:50%;animation:bounce 1.2s infinite;}
        .typing span:nth-child(2){animation-delay:0.2s;}
        .typing span:nth-child(3){animation-delay:0.4s;}
        @keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-6px)}}

        /* INPUT AREA */
        .input-area{background:var(--bg2);border-top:1px solid var(--border);padding:14px 20px;flex-shrink:0;}
        .input-wrap{display:flex;gap:10px;align-items:flex-end;background:var(--bg3);border:1px solid var(--border2);border-radius:12px;padding:8px 12px;transition:border-color 0.15s;}
        .input-wrap:focus-within{border-color:var(--teal);box-shadow:0 0 0 3px rgba(14,165,201,0.08);}
        .chat-input{flex:1;background:none;border:none;outline:none;font-family:var(--sans);font-size:13px;color:var(--text);resize:none;max-height:120px;line-height:1.5;min-height:20px;}
        .chat-input::placeholder{color:var(--text3);}
        .btn-send{background:var(--grad);color:#fff;border:none;border-radius:8px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;font-size:16px;transition:opacity 0.15s,transform 0.15s;}
        .btn-send:hover{opacity:0.9;transform:scale(1.05);}
        .btn-send:disabled{opacity:0.4;cursor:not-allowed;transform:none;}
        .input-hint{font-family:var(--mono);font-size:9px;color:var(--text3);margin-top:6px;text-align:right;}

        /* MOBILE */
        @media(max-width:768px){
            .chat-sidebar{display:none;}
            .chat-sidebar.open{display:flex;position:absolute;top:60px;left:0;bottom:0;z-index:50;}
        }

        ::-webkit-scrollbar{width:4px;} ::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
        @keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
    </style>
</head>
<body>

<!-- NAV -->
<div id="topnav"></div>
<script src="/static/nav.js"></script>

<!-- LAYOUT -->
<div class="chat-layout">

    <!-- SIDEBAR -->
    <div class="chat-sidebar" id="chat-sidebar">
        <div class="context-bar">
            <div class="context-label">Contesto analisi</div>
            <select class="context-select" id="context-select" onchange="updateContext()">
                <option value="general">📊 Generale</option>
                <option value="today">📅 Articoli di oggi</option>
                <option value="week">📆 Ultima settimana</option>
                <option value="month">🗓️ Ultimo mese</option>
            </select>
        </div>
        <div class="sidebar-header">
            <span class="sidebar-title">Conversazioni</span>
            <button class="btn-new-chat" onclick="newConversation()">+ Nuova</button>
        </div>
        <div class="conv-list" id="conv-list">
            <div class="conv-empty">Nessuna conversazione</div>
        </div>
    </div>

    <!-- CHAT MAIN -->
    <div class="chat-main">
        <div class="chat-header">
            <div class="chat-header-title" id="chat-title">NUOVA ANALISI</div>
            <span class="model-badge">GPT-4o-mini</span>
        </div>

        <div class="messages-wrap" id="messages-wrap">
            <div class="welcome-state" id="welcome-state">
                <div class="welcome-icon">🧠</div>
                <div class="welcome-title">AI Analysis</div>
                <div class="welcome-sub">FAI UNA DOMANDA SUGLI ARTICOLI<br>NEL TUO DATABASE</div>
                <div class="suggestions">
                    <button class="suggestion-btn" onclick="useSuggestion(this)">Quali clienti hanno avuto più copertura oggi?</button>
                    <button class="suggestion-btn" onclick="useSuggestion(this)">Quali testate hanno pubblicato di più nell'ultima settimana?</button>
                    <button class="suggestion-btn" onclick="useSuggestion(this)">Analizza il tono degli articoli recenti</button>
                    <button class="suggestion-btn" onclick="useSuggestion(this)">Chi sono i giornalisti più attivi questo mese?</button>
                    <button class="suggestion-btn" onclick="useSuggestion(this)">Dammi un riassunto delle notizie di oggi</button>
                    <button class="suggestion-btn" onclick="useSuggestion(this)">Quali argomenti dominano questa settimana?</button>
                </div>
            </div>
            <div id="messages-list"></div>
        </div>

        <div class="input-area">
            <div class="input-wrap">
                <textarea class="chat-input" id="chat-input" placeholder="Fai una domanda sugli articoli nel database..." rows="1"
                    onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
                <button class="btn-send" id="send-btn" onclick="sendMessage()">↑</button>
            </div>
            <div class="input-hint">INVIO per inviare · SHIFT+INVIO per andare a capo</div>
        </div>
    </div>
</div>

<script>
    let conversations = [];
    let currentConvId = null;
    let currentMessages = [];
    let isLoading = false;
    let mobileMenuOpen = false;
    let currentContext = 'general';

    function toggleMobileMenu(e) {
        e.stopPropagation();
        mobileMenuOpen = !mobileMenuOpen;
        document.getElementById('mobile-menu').style.display = mobileMenuOpen ? 'flex' : 'none';
    }
    document.addEventListener('click', function(e) {
        if (mobileMenuOpen && !e.target.closest('#mobile-menu')) {
            document.getElementById('mobile-menu').style.display = 'none';
            mobileMenuOpen = false;
        }
    });

    function updateContext() {
        currentContext = document.getElementById('context-select').value;
    }

    function autoResize(el) {
        el.style.height = 'auto';
        el.style.height = Math.min(el.scrollHeight, 120) + 'px';
    }

    function handleKey(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    }

    function useSuggestion(btn) {
        document.getElementById('chat-input').value = btn.innerText;
        sendMessage();
    }

    function formatTime(d) {
        return new Date(d).toLocaleTimeString('it-IT', {hour:'2-digit', minute:'2-digit'});
    }

    function escapeHtml(text) {
        return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function formatMessage(text) {
        text = text.replace(/```([\s\S]*?)```/g, function(m, c){ return '<pre>' + c + '</pre>'; });
        text = text.replace(/\*\*(.*?)\*\*/g, function(m, c){ return '<strong>' + c + '</strong>'; });
        text = text.replace(/\*(.*?)\*/g, function(m, c){ return '<em>' + c + '</em>'; });
        text = text.replace(/\n/g, '<br>');
        return text;
    }

    function renderMessages() {
        const list = document.getElementById('messages-list');
        const welcome = document.getElementById('welcome-state');

        if (!currentMessages.length) {
            welcome.style.display = 'flex';
            list.innerHTML = '';
            return;
        }

        welcome.style.display = 'none';
        list.innerHTML = currentMessages.map(m => {
            const isUser = m.role === 'user';
            const avatar = isUser ? '👤' : '🤖';
            const roleClass = isUser ? 'user' : 'ai';
            const content = isUser ? escapeHtml(m.content) : formatMessage(m.content);
            return `<div class="message ${roleClass} fade-in">
                <div class="msg-avatar ${roleClass}">${avatar}</div>
                <div>
                    <div class="msg-bubble">${content}</div>
                    <div class="msg-time">${m.time ? formatTime(m.time) : ''}</div>
                </div>
            </div>`;
        }).join('');

        scrollToBottom();
    }

    function scrollToBottom() {
        const wrap = document.getElementById('messages-wrap');
        wrap.scrollTop = wrap.scrollHeight;
    }

    function addTypingIndicator() {
        const list = document.getElementById('messages-list');
        const el = document.createElement('div');
        el.className = 'message ai fade-in';
        el.id = 'typing-indicator';
        el.innerHTML = `<div class="msg-avatar ai">🤖</div>
            <div class="msg-bubble">
                <div class="typing"><span></span><span></span><span></span></div>
            </div>`;
        list.appendChild(el);
        scrollToBottom();
    }

    function removeTypingIndicator() {
        const el = document.getElementById('typing-indicator');
        if (el) el.remove();
    }

    async function sendMessage() {
        const input = document.getElementById('chat-input');
        const text = input.value.trim();
        if (!text || isLoading) return;

        isLoading = true;
        document.getElementById('send-btn').disabled = true;
        input.value = '';
        input.style.height = 'auto';

        // Aggiungi messaggio utente
        currentMessages.push({ role:'user', content:text, time:new Date() });
        renderMessages();
        addTypingIndicator();

        // Aggiorna titolo conversazione
        if (currentMessages.length === 1) {
            document.getElementById('chat-title').innerText = text.substring(0,50).toUpperCase() + (text.length>50?'...':'');
        }

        try {
            const res = await fetch('/api/chat', {
                method: 'POST',
                headers: {'Content-Type':'application/json'},
                body: JSON.stringify({
                    message: text,
                    history: currentMessages.slice(0,-1).map(m=>({role:m.role,content:m.content})),
                    context: currentContext
                })
            });
            const data = await res.json();
            removeTypingIndicator();

            const reply = data.response || data.error || 'Errore nella risposta.';
            currentMessages.push({ role:'assistant', content:reply, time:new Date() });
            renderMessages();
            saveConversation();

        } catch(e) {
            removeTypingIndicator();
            currentMessages.push({ role:'assistant', content:'Errore di connessione. Riprova.', time:new Date() });
            renderMessages();
        }

        isLoading = false;
        document.getElementById('send-btn').disabled = false;
        input.focus();
    }

    function newConversation() {
        currentConvId = Date.now().toString();
        currentMessages = [];
        document.getElementById('chat-title').innerText = 'NUOVA ANALISI';
        renderMessages();
        renderConvList();
    }

    function saveConversation() {
        if (!currentConvId) currentConvId = Date.now().toString();
        const idx = conversations.findIndex(c=>c.id===currentConvId);
        const firstMsg = currentMessages.find(m=>m.role==='user');
        const conv = {
            id: currentConvId,
            title: firstMsg ? firstMsg.content.substring(0,40) : 'Nuova analisi',
            messages: currentMessages,
            date: new Date()
        };
        if (idx>=0) conversations[idx]=conv;
        else conversations.unshift(conv);
        renderConvList();
        try { localStorage.setItem('spiz_conversations', JSON.stringify(conversations.slice(0,20))); } catch(e){}
    }

    function loadConversation(id) {
        const conv = conversations.find(c=>c.id===id);
        if (!conv) return;
        currentConvId = id;
        currentMessages = conv.messages;
        document.getElementById('chat-title').innerText = conv.title.toUpperCase();
        renderMessages();
        renderConvList();
    }

    function renderConvList() {
        const el = document.getElementById('conv-list');
        if (!conversations.length) {
            el.innerHTML = '<div class="conv-empty">Nessuna conversazione</div>';
            return;
        }
        el.innerHTML = conversations.map(c => {
            const active = c.id===currentConvId ? 'active' : '';
            const date = new Date(c.date).toLocaleDateString('it-IT',{day:'2-digit',month:'2-digit'});
            return `<div class="conv-item ${active}" onclick="loadConversation('${c.id}')">
                <div class="conv-title">${c.title}</div>
                <div class="conv-date">${date}</div>
            </div>`;
        }).join('');
    }

    // Carica conversazioni da localStorage
    window.onload = () => {
        try {
            const saved = localStorage.getItem('spiz_conversations');
            if (saved) conversations = JSON.parse(saved);
            renderConvList();
        } catch(e){}
        newConversation();
    };
</script>
</body>
</html>
