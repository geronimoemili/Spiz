<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MAIM · Digest</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=IBM+Plex+Sans:wght@300;400;600;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#f4f6f9;--surface:#fff;--border:#dde3ed;--border2:#eef1f6;
  --text:#1a2236;--muted:#5a6a84;--faint:#9aabc0;
  --cyan:#0ea5c9;--pink:#d4367a;--amber:#d97706;--green:#059669;--red:#e03a5a;
  --grad:linear-gradient(135deg,#0ea5c9,#d4367a);
  --mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);font-size:13px;background:var(--bg);color:var(--text);min-height:100vh}
nav{background:var(--surface);border-bottom:2px solid var(--border);height:56px;display:flex;align-items:center;padding:0 24px;gap:16px;position:sticky;top:0;z-index:100}
.logo-img{height:38px;width:auto;flex-shrink:0}
.nav-links{display:flex;gap:2px;margin-left:auto}
.nav-link{color:var(--muted);font-size:11px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;padding:6px 14px;border-bottom:2px solid transparent}
.nav-link:hover{color:var(--text)}
.nav-link.active{color:var(--pink);border-bottom-color:var(--pink)}

.layout{display:grid;grid-template-columns:1fr 320px;gap:20px;max-width:1200px;margin:0 auto;padding:24px}

.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:16px}
.card:last-child{margin-bottom:0}
.card-head{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
.card-title{font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase}
.card-body{padding:14px 16px}

.btn{font-family:var(--mono);font-size:10px;font-weight:700;border-radius:5px;padding:6px 12px;cursor:pointer;border:none;display:inline-flex;align-items:center;gap:5px;transition:opacity .15s;white-space:nowrap}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-grad{background:var(--grad);color:#fff}
.btn-grad:hover:not(:disabled){opacity:.88}
.btn-out{background:var(--surface);border:1px solid var(--border);color:var(--muted)}
.btn-out:hover:not(:disabled){border-color:var(--cyan);color:var(--cyan)}
.btn-send{width:100%;padding:13px;font-family:var(--mono);font-size:13px;font-weight:700;background:var(--grad);color:#fff;border:none;border-radius:6px;cursor:pointer;transition:opacity .15s}
.btn-send:hover:not(:disabled){opacity:.88}
.btn-send:disabled{opacity:.4;cursor:not-allowed}

/* CONTATORE — barra sopra la textarea */
.counter-bar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:6px;
}
.char-counter{
  font-family:var(--mono);
  font-size:13px;
  font-weight:700;
  padding:5px 12px;
  border-radius:5px;
  background:var(--border2);
  color:var(--muted);
  border:1px solid var(--border);
  transition:background .2s, color .2s, border-color .2s;
  letter-spacing:.5px;
}
.char-counter.warn{
  background:rgba(217,119,6,.1);
  color:var(--amber);
  border-color:rgba(217,119,6,.35);
}
.char-counter.over{
  background:rgba(224,58,90,.1);
  color:var(--red);
  border-color:rgba(224,58,90,.4);
}

.digest-text{width:100%;min-height:480px;font-family:var(--mono);font-size:11px;line-height:1.75;padding:14px;border:1px solid var(--border);border-radius:6px;background:var(--border2);color:var(--text);outline:none;resize:vertical}
.digest-text:focus{border-color:var(--cyan);background:#fff}
.digest-text[readonly]{cursor:default}

.toolbar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}

select,input[type=text],input[type=email]{font-family:var(--sans);font-size:12px;padding:6px 9px;border:1px solid var(--border);border-radius:5px;background:var(--border2);color:var(--text);outline:none}
select:focus,input:focus{border-color:var(--cyan);background:#fff}

.r-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border2)}
.r-row:last-child{border-bottom:none}
.r-name{font-size:12px;font-weight:600;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.r-email{font-family:var(--mono);font-size:9px;color:var(--faint);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:160px}
.r-btn{background:none;border:none;cursor:pointer;font-size:13px;padding:0 3px;color:var(--faint)}
.r-btn:hover{color:var(--red)}
.toggle{width:34px;height:18px;border-radius:9px;border:none;cursor:pointer;flex-shrink:0}
.toggle.on{background:var(--green)}
.toggle.off{background:var(--border)}

.hist-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border2);cursor:pointer}
.hist-row:last-child{border-bottom:none}
.hist-row:hover .hist-date{color:var(--cyan)}
.hist-date{font-family:var(--mono);font-size:10px;font-weight:700}
.hist-meta{font-family:var(--mono);font-size:9px;color:var(--faint)}

.badge{font-family:var(--mono);font-size:9px;font-weight:700;padding:3px 8px;border-radius:4px}
.badge-ok{background:rgba(5,150,105,.1);color:var(--green)}
.badge-no{background:var(--border2);color:var(--faint)}

.spinner{display:inline-block;width:12px;height:12px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle}
.spinner-dark{border:2px solid rgba(14,165,201,.2);border-top-color:var(--cyan)}
@keyframes spin{to{transform:rotate(360deg)}}

.toast{position:fixed;bottom:20px;right:20px;background:#1a2236;color:#fff;padding:10px 18px;border-radius:7px;font-family:var(--mono);font-size:11px;box-shadow:0 4px 16px rgba(0,0,0,.2);transform:translateY(60px);opacity:0;transition:all .3s;z-index:9999}
.toast.show{transform:translateY(0);opacity:1}
.toast.ok{border-left:3px solid var(--green)}
.toast.err{border-left:3px solid var(--red)}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
</style>
</head>
<body>

<div id="topnav"></div>
<script src="/static/nav.js"></script>

<div class="layout">

  <!-- SINISTRA: TESTO DIGEST -->
  <div>
    <div class="card">
      <div class="card-head">
        <div style="display:flex;align-items:center;gap:10px">
          <span class="card-title">&#128240; Digest</span>
          <span class="badge badge-no" id="status-badge">Nessun digest</span>
        </div>
        <select id="date-sel" onchange="loadDigest(this.value)" style="width:auto"></select>
      </div>
      <div class="card-body">
        <div class="toolbar">
          <button class="btn btn-out" id="btn-gen" onclick="genera()">&#9889; Genera</button>
          <button class="btn btn-out" id="btn-edit" onclick="toggleEdit()" style="display:none">&#9999;&#65039; Modifica</button>
          <button class="btn btn-out" id="btn-save" onclick="salva()" style="display:none">&#128190; Salva</button>
          <button class="btn btn-out" id="btn-cancel" onclick="annulla()" style="display:none">&#10005;</button>
          <button class="btn btn-out" id="btn-wa" onclick="copiaWA()" style="display:none">&#128242; Copia WA</button>
          <button class="btn btn-out" id="btn-leggi" onclick="leggi()">&#128266; Leggi</button>
          <button class="btn btn-out" id="btn-mp3" onclick="scaricaMP3()" style="display:none">&#11015;&#65039; MP3</button>
        </div>

        <!-- CONTATORE sopra la textarea -->
        <div class="counter-bar">
          <span style="font-family:var(--mono);font-size:9px;color:var(--faint);letter-spacing:.5px;text-transform:uppercase">Caratteri (spazi inclusi)</span>
          <span class="char-counter" id="char-counter">0</span>
        </div>

        <textarea class="digest-text" id="digest-ta" readonly placeholder="Nessun digest. Premi &#9889; Genera." oninput="aggiornaContatore()"></textarea>

        <div id="audio-player-wrap" style="display:none;margin-top:10px;background:var(--border2);border-radius:6px;padding:10px 12px">
          <audio id="audio-player" controls style="width:100%;margin-bottom:4px"></audio>
          <div style="font-family:var(--mono);font-size:9px;color:var(--faint)" id="audio-info"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- DESTRA -->
  <div>
    <!-- INVIA -->
    <div class="card" style="border:2px solid var(--cyan)">
      <div class="card-head">
        <span class="card-title">&#128231; Invia digest</span>
      </div>
      <div class="card-body" style="display:flex;flex-direction:column;gap:10px">
        <button class="btn-send" id="btn-send" onclick="invia()" disabled>
          &#128231; Invia a tutti
        </button>
        <div style="font-family:var(--mono);font-size:9px;color:var(--faint);text-align:center">
          Invia testo + audio MP3 a tutti i destinatari attivi
        </div>
      </div>
    </div>

    <!-- DESTINATARI -->
    <div class="card">
      <div class="card-head">
        <span class="card-title">&#128101; Destinatari</span>
        <span class="badge badge-no" id="r-count">0 attivi</span>
      </div>
      <div class="card-body">
        <div id="r-list" style="margin-bottom:10px"></div>
        <div style="display:flex;gap:6px">
          <input type="text" id="r-nome" placeholder="Nome" style="width:90px;flex-shrink:0"/>
          <input type="email" id="r-email" placeholder="email@&#8230;" style="flex:1"/>
          <button class="btn btn-grad" onclick="addR()" style="padding:6px 10px">+</button>
        </div>
      </div>
    </div>

    <!-- STORICO -->
    <div class="card">
      <div class="card-head"><span class="card-title">&#128197; Storico</span></div>
      <div class="card-body" style="padding:8px 16px">
        <div id="hist-list"></div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const today = new Date().toISOString().split('T')[0];
let currentDate = today;
let originalText = '';
let editing = false;
let pollTimer = null;

const fmt = d => d ? new Date(d+'T12:00:00').toLocaleDateString('it-IT',{day:'2-digit',month:'2-digit',year:'2-digit'}) : '—';

function toast(msg, type='ok'){
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = `toast show ${type}`;
  setTimeout(()=>t.classList.remove('show'), 3000);
}

function setStatus(s, label){
  const el = document.getElementById('status-badge');
  if(s==='ok'){ el.textContent = label||'✓ Pronto'; el.className='badge badge-ok'; }
  else { el.textContent = label||'Nessun digest'; el.className='badge badge-no'; }
}

// CONTATORE CARATTERI
function aggiornaContatore(){
  const n = document.getElementById('digest-ta').value.length;
  const el = document.getElementById('char-counter');
  el.textContent = n.toLocaleString('it-IT');
  el.className = 'char-counter';
  if(n > 4000)      el.classList.add('over');
  else if(n > 3200) el.classList.add('warn');
}

// INIT
window.addEventListener('load', async ()=>{
  await loadDates();
  await loadDigest('today');
  await loadRecipients();
});

async function loadDates(){
  try{
    const d = await fetch('/api/digest/dates').then(r=>r.json());
    const sel = document.getElementById('date-sel');
    sel.innerHTML = '<option value="today">Oggi</option>';
    (d.dates||[]).forEach(row=>{
      if(row.data === today) return;
      const o = document.createElement('option');
      o.value = row.data;
      o.textContent = fmt(row.data);
      sel.appendChild(o);
    });
    const hist = document.getElementById('hist-list');
    hist.innerHTML = (d.dates||[]).length ? (d.dates||[]).map(row=>`
      <div class="hist-row" onclick="loadDigest('${row.data}')">
        <div class="hist-date">${fmt(row.data)}</div>
        <div class="hist-meta">${row.articles_today||0} art.</div>
      </div>`).join('') : '<div style="font-family:var(--mono);font-size:10px;color:var(--faint)">Nessuno storico</div>';
  }catch(e){}
}

async function loadDigest(dateVal){
  currentDate = dateVal === 'today' ? today : dateVal;
  document.getElementById('date-sel').value = dateVal;
  try{
    const d = await fetch(`/api/digest/${currentDate}`).then(r=>r.json());
    if(d.error || !d.text){ setEmpty(); return; }
    setTesto(d.text);
    setStatus('ok', `✓ ${fmt(currentDate)}`);
    show(['btn-edit','btn-wa','btn-mp3']);
    document.getElementById('btn-send').disabled = false;
  }catch(e){ setEmpty(); }
}

function setEmpty(){
  document.getElementById('digest-ta').value = '';
  setStatus('no');
  hide(['btn-edit','btn-wa','btn-mp3','btn-save','btn-cancel']);
  document.getElementById('audio-player-wrap').style.display='none';
  document.getElementById('btn-send').disabled = true;
  originalText = '';
  aggiornaContatore();
}

function setTesto(text){
  originalText = text;
  const ta = document.getElementById('digest-ta');
  ta.value = text;
  ta.readOnly = true;
  editing = false;
  hide(['btn-save','btn-cancel']);
  document.getElementById('btn-edit').textContent = '✏️ Modifica';
  audioUrl = null;
  const p = document.getElementById('audio-player');
  p.pause(); p.src='';
  document.getElementById('audio-player-wrap').style.display='none';
  aggiornaContatore();
}

function show(ids){ ids.forEach(id=>{ const el=document.getElementById(id); if(el) el.style.display=''; }); }
function hide(ids){ ids.forEach(id=>{ const el=document.getElementById(id); if(el) el.style.display='none'; }); }

// GENERA
async function genera(){
  const btn = document.getElementById('btn-gen');
  btn.disabled = true; btn.innerHTML = '<div class="spinner spinner-dark" style="border-top-color:var(--cyan)"></div> Generazione…';
  try{
    const res = await fetch('/api/daily-digest',{method:'POST'}).then(r=>r.json());
    if(!res.success){ toast('Errore: '+(res.error||''),'err'); return; }
    pollJob(res.job_id);
  }catch(e){ toast('Errore connessione','err'); }
  finally{ btn.disabled=false; btn.textContent='⚡ Genera'; }
}

function pollJob(jobId){
  if(pollTimer) clearInterval(pollTimer);
  pollTimer = setInterval(async()=>{
    try{
      const d = await fetch(`/api/job/${jobId}`).then(r=>r.json());
      if(d.status==='done'){
        clearInterval(pollTimer);
        await loadDigest('today');
        await loadDates();
        toast('✅ Digest generato');
      } else if(d.status==='error'){
        clearInterval(pollTimer);
        toast('Errore: '+(d.error||''),'err');
      }
    }catch(e){ clearInterval(pollTimer); }
  }, 2000);
}

// EDIT
function toggleEdit(){
  editing = !editing;
  const ta = document.getElementById('digest-ta');
  const btn = document.getElementById('btn-edit');
  if(editing){
    ta.readOnly = false; ta.focus();
    show(['btn-save','btn-cancel']);
    btn.style.display = 'none';
  } else {
    annulla();
  }
}

function annulla(){
  editing = false;
  const ta = document.getElementById('digest-ta');
  ta.value = originalText; ta.readOnly = true;
  hide(['btn-save','btn-cancel']);
  document.getElementById('btn-edit').style.display = '';
  document.getElementById('btn-edit').textContent = '✏️ Modifica';
  aggiornaContatore();
}

async function salva(){
  const text = document.getElementById('digest-ta').value;
  try{
    const res = await fetch(`/api/digest/${currentDate}/text`,{
      method:'PUT', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({text})
    }).then(r=>r.json());
    if(res.success){ toast('✅ Salvato'); setTesto(text); }
    else toast('Errore salvataggio','err');
  }catch(e){ toast('Errore','err'); }
}

// COPIA WA
function copiaWA(){
  const text = document.getElementById('digest-ta').value;
  if(!text){ toast('Nessun testo','err'); return; }
  if(navigator.clipboard){
    navigator.clipboard.writeText(text).then(()=>toast('✅ Copiato per WhatsApp'));
  } else {
    const ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta);
    ta.select(); document.execCommand('copy');
    document.body.removeChild(ta);
    toast('✅ Copiato');
  }
}

// LEGGI AD ALTA VOCE
let audioUrl = null;

async function leggi(){
  const btn = document.getElementById('btn-leggi');
  const player = document.getElementById('audio-player');
  if(audioUrl){
    if(player.paused){ player.play(); btn.textContent='⏸ Pausa'; }
    else { player.pause(); btn.textContent='🔊 Leggi'; }
    return;
  }
  btn.disabled = true; btn.textContent = '⏳ Generazione…';
  const text = document.getElementById('digest-ta').value;
  if(!text){ toast('Nessun testo','err'); btn.disabled=false; btn.textContent='🔊 Leggi'; return; }
  try{
    const res = await fetch('/api/digest-audio',{
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({text: text.substring(0,4096)})
    });
    if(!res.ok){ toast('Errore generazione audio','err'); return; }
    const blob = await res.blob();
    audioUrl = URL.createObjectURL(blob);
    player.src = audioUrl;
    document.getElementById('audio-player-wrap').style.display='block';
    document.getElementById('audio-info').textContent = `Nova · ${(blob.size/1024).toFixed(0)} KB`;
    player.play();
    btn.textContent='⏸ Pausa';
    player.onended = ()=>{ btn.textContent='🔊 Leggi'; };
    player.onpause = ()=>{ if(!player.ended) btn.textContent='🔊 Leggi'; };
    player.onplay  = ()=>{ btn.textContent='⏸ Pausa'; };
  }catch(e){ toast('Errore: '+e.message,'err'); }
  finally{ btn.disabled=false; }
}

// SCARICA MP3
async function scaricaMP3(){
  const btn = document.getElementById('btn-mp3');
  btn.disabled = true; btn.textContent = '⏳ Generazione…';
  const text = document.getElementById('digest-ta').value;
  if(!text){ toast('Nessun testo','err'); btn.disabled=false; btn.textContent='⬇️ MP3'; return; }
  try{
    const res = await fetch('/api/digest-audio',{
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({text: text.substring(0,4096)})
    });
    if(!res.ok){ toast('Errore generazione audio','err'); return; }
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `MAIM_Digest_${currentDate}.mp3`;
    a.click(); URL.revokeObjectURL(url);
    toast('✅ Download avviato');
  }catch(e){ toast('Errore: '+e.message,'err'); }
  finally{ btn.disabled=false; btn.textContent='⬇️ MP3'; }
}

// INVIA
async function invia(){
  const btn = document.getElementById('btn-send');
  btn.disabled = true; btn.innerHTML = '<div class="spinner"></div> Invio…';
  try{
    const res = await fetch('/api/digest-send-email',{
      method:'POST', headers:{'Content-Type':'application/json'}, body:'{}'
    }).then(r=>r.json());
    if(res.success) toast('✅ Digest inviato con audio allegato');
    else toast('Errore: '+(res.error||''),'err');
  }catch(e){ toast('Errore connessione','err'); }
  finally{ btn.disabled=false; btn.innerHTML='📧 Invia a tutti'; }
}

// DESTINATARI
async function loadRecipients(){
  try{
    const d = await fetch('/api/digest-recipients').then(r=>r.json());
    const active = (d||[]).filter(r=>r.active).length;
    document.getElementById('r-count').textContent = `${active} attivi`;
    document.getElementById('r-list').innerHTML = (d||[]).map(r=>`
      <div class="r-row">
        <div style="flex:1;min-width:0">
          <div class="r-name">${r.name||'—'}</div>
          <div class="r-email">${r.email}</div>
        </div>
        <button class="toggle ${r.active?'on':'off'}" onclick="toggleR('${r.id}',${!r.active})" title="${r.active?'Disattiva':'Attiva'}"></button>
        <button class="r-btn" onclick="delR('${r.id}')">✕</button>
      </div>`).join('') || '<div style="font-family:var(--mono);font-size:10px;color:var(--faint)">Nessun destinatario</div>';
  }catch(e){}
}

async function addR(){
  const email = document.getElementById('r-email').value.trim();
  const name  = document.getElementById('r-nome').value.trim();
  if(!email){ toast('Email obbligatoria','err'); return; }
  try{
    const res = await fetch('/api/digest-recipients',{
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({email, name, active:true})
    }).then(r=>r.json());
    if(res.success){
      toast('✅ Aggiunto');
      document.getElementById('r-email').value='';
      document.getElementById('r-nome').value='';
      loadRecipients();
    } else toast('Errore: '+(res.error||''),'err');
  }catch(e){ toast('Errore','err'); }
}

async function delR(id){
  if(!confirm('Rimuovere?')) return;
  await fetch(`/api/digest-recipients/${id}`,{method:'DELETE'});
  toast('Rimosso'); loadRecipients();
}

async function toggleR(id, active){
  await fetch(`/api/digest-recipients/${id}/toggle`,{
    method:'PATCH', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({active})
  });
  loadRecipients();
}
</script>
</body>
</html>
